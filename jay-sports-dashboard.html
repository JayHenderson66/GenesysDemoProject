<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jay's Sports Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f12;
    --surface: #161920;
    --surface2: #1e2229;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #f0f2f5;
    --muted: #7a8494;
    --dim: #3d4450;
    --win: #2d6a2d;
    --win-text: #7dce7d;
    --loss: #6a2d2d;
    --loss-text: #ce7d7d;
    --live: #1a3a6a;
    --live-text: #5ba3f5;
    --accent: #f5a623;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; }

  /* HEADER */
  header { padding: 2rem 2rem 0; display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 700; letter-spacing: 0.04em; color: var(--text); }
  .logo span { color: var(--accent); }
  .last-updated { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }

  /* TABS */
  .tabs { display: flex; gap: 0; padding: 1.5rem 2rem 0; border-bottom: 1px solid var(--border); overflow-x: auto; }
  .tab { display: flex; align-items: center; gap: 8px; padding: 10px 18px; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; transition: color 0.15s, border-color 0.15s; background: none; border-top: none; border-left: none; border-right: none; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* CONTENT */
  .content { padding: 1.5rem 2rem 3rem; max-width: 900px; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* STAT CARDS */
  .stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
  .stat-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .stat-value { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .highlight { color: var(--live-text); }
  .good { color: var(--win-text); }
  .bad { color: var(--loss-text); }

  /* SECTION LABEL */
  .section-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin: 1.5rem 0 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

  /* GAME ROWS */
  .games { display: flex; flex-direction: column; gap: 5px; margin-bottom: 1.5rem; }
  .game { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 14px; }
  .game-badge { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .badge-w { background: var(--win); color: var(--win-text); }
  .badge-l { background: var(--loss); color: var(--loss-text); }
  .badge-live { background: var(--live); color: var(--live-text); }
  .badge-up { background: var(--surface2); color: var(--dim); font-size: 9px; }
  .game-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); min-width: 68px; }
  .game-matchup { flex: 1; color: var(--text); }
  .game-score { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; text-align: right; min-width: 90px; }
  .pill { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-family: 'DM Mono', monospace; flex-shrink: 0; }
  .pill-live { background: var(--live); color: var(--live-text); }
  .pill-up { background: var(--surface2); color: var(--muted); }

  /* LINESCORE */
  .linescore-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 12px; overflow-x: auto; }
  .linescore { width: 100%; border-collapse: collapse; font-family: 'DM Mono', monospace; font-size: 12px; white-space: nowrap; }
  .linescore th { color: var(--muted); font-weight: 400; padding: 3px 8px; text-align: center; }
  .linescore td { padding: 5px 8px; text-align: center; }
  .linescore .tname { text-align: left; font-family: 'Barlow', sans-serif; font-weight: 500; font-size: 13px; }
  .linescore .total { font-weight: 700; font-size: 14px; border-left: 1px solid var(--border2); }

  /* WIN BAR */
  .win-bar { display: flex; height: 6px; border-radius: 3px; overflow: hidden; margin: 8px 0 4px; }
  .win-bar .w { background: var(--win-text); }
  .win-bar .l { background: var(--loss-text); }
  .bar-legend { display: flex; gap: 16px; font-size: 11px; color: var(--muted); margin-bottom: 1rem; }
  .bar-dot { display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 5px; }

  /* NEWS */
  .news { display: flex; flex-direction: column; gap: 5px; }
  .news-item { display: flex; align-items: flex-start; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; text-decoration: none; transition: border-color 0.15s, background 0.15s; }
  .news-item:hover { border-color: var(--border2); background: var(--surface2); }
  .news-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
  .news-body { flex: 1; }
  .news-title { font-size: 13px; color: var(--text); line-height: 1.45; margin-bottom: 3px; }
  .news-meta { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }
  .news-ext { font-size: 13px; color: var(--dim); flex-shrink: 0; margin-top: 2px; }

  /* PLAYOFFS BOX */
  .playoffs-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 12px; }
  .playoffs-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .playoffs-line { font-size: 13px; color: var(--text); margin-bottom: 3px; }

  /* OFF-SEASON */
  .offseason { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 28px 20px; text-align: center; margin-bottom: 16px; }
  .offseason-title { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .offseason-sub { font-size: 13px; color: var(--muted); line-height: 1.6; }

  /* LOADING */
  .loading { text-align: center; padding: 3rem; font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted); }
  .error { background: var(--surface); border: 1px solid var(--loss); border-radius: 8px; padding: 12px 16px; font-size: 13px; color: var(--loss-text); margin-bottom: 12px; }

  /* REFRESH BTN */
  .refresh-btn { display: inline-flex; align-items: center; gap: 6px; margin-top: 2rem; padding: 9px 20px; border-radius: 6px; border: 1px solid var(--border2); background: var(--surface); color: var(--muted); font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }


  /* STANDINGS */
  .standings-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 1.5rem; }
  .standings-table th { font-family: "DM Mono", monospace; font-size: 10px; color: var(--muted); font-weight: 400; text-transform: uppercase; letter-spacing: 0.06em; padding: 6px 10px; text-align: right; border-bottom: 1px solid var(--border); }
  .standings-table th:first-child { text-align: left; }
  .standings-table td { padding: 8px 10px; text-align: right; color: var(--text); border-bottom: 1px solid var(--border); }
  .standings-table td:first-child { text-align: left; font-weight: 500; }
  .standings-table tr.my-team td { color: var(--accent); background: rgba(245,166,35,0.05); }
  .standings-table tr:last-child td { border-bottom: none; }
  .standings-rank { color: var(--muted); font-family: "DM Mono", monospace; font-size: 11px; margin-right: 6px; }

  /* MOBILE */
  @media (max-width: 600px) {
    header, .content { padding-left: 1rem; padding-right: 1rem; }
    .tabs { padding-left: 1rem; }
    .tab { padding: 10px 12px; font-size: 13px; }
    .stat-value { font-size: 22px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">JAY'S <span>SPORTS</span> DASHBOARD</div>
  <div class="last-updated" id="last-updated">Loading...</div>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab('padres')" id="tab-padres">
    <span class="tab-dot" style="background:#FFC425;"></span>Padres
  </button>
  <button class="tab" onclick="showTab('clippers')" id="tab-clippers">
    <span class="tab-dot" style="background:#C8102E;"></span>Clippers
  </button>
  <button class="tab" onclick="showTab('chargers')" id="tab-chargers">
    <span class="tab-dot" style="background:#0080C6;"></span>Chargers
  </button>
  <button class="tab" onclick="showTab('sdsu-fb')" id="tab-sdsu-fb">
    <span class="tab-dot" style="background:#A6192E;"></span>Aztecs FB
  </button>
  <button class="tab" onclick="showTab('sdsu-bb')" id="tab-sdsu-bb">
    <span class="tab-dot" style="background:#A6192E;"></span>Aztecs BB
  </button>
  <button class="tab" onclick="showTab('orioles')" id="tab-orioles">
    <span class="tab-dot" style="background:#DF4601;"></span>Orioles
  </button>
  <button class="tab" onclick="showTab('ravens')" id="tab-ravens">
    <span class="tab-dot" style="background:#9E2A2B;"></span>Ravens
  </button>
</div>

<div class="content">
  <div class="panel active" id="panel-padres"><div class="loading">Loading Padres data...</div></div>
  <div class="panel" id="panel-clippers"><div class="loading">Loading Clippers data...</div></div>
  <div class="panel" id="panel-chargers"><div class="loading">Loading Chargers data...</div></div>
  <div class="panel" id="panel-sdsu-fb"><div class="loading">Loading Aztecs Football data...</div></div>
  <div class="panel" id="panel-sdsu-bb"><div class="loading">Loading Aztecs Basketball data...</div></div>
  <div class="panel" id="panel-orioles"><div class="loading">Loading Orioles data...</div></div>
  <div class="panel" id="panel-ravens"><div class="loading">Loading Ravens data...</div></div>
  <button class="refresh-btn" onclick="refreshAll()">
    <svg id="refresh-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
    Refresh All
  </button>
</div>

<script>
const ESPN = 'https://site.api.espn.com/apis/site/v2/sports';
const NEWS_PROXY = 'https://site.api.espn.com/apis/site/v2/sports';

function fmtDate(d) {
  const dt = new Date(d);
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', timeZone: 'America/Los_Angeles' });
}
function fmtTime(d) {
  const dt = new Date(d);
  return dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZone: 'America/Los_Angeles' });
}
function badge(result) {
  if (result === 'live') return '<span class="game-badge badge-live">●</span>';
  if (result === 'W') return '<span class="game-badge badge-w">W</span>';
  if (result === 'L') return '<span class="game-badge badge-l">L</span>';
  return '<span class="game-badge badge-up">—</span>';
}
function pill(type, text) {
  return `<span class="pill pill-${type}">${text}</span>`;
}
function newsItem(href, dotColor, title, meta) {
  return `<a class="news-item" href="${href}" target="_blank" rel="noopener">
    <span class="news-dot" style="background:${dotColor};"></span>
    <div class="news-body"><div class="news-title">${title}</div><div class="news-meta">${meta}</div></div>
    <svg class="news-ext" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
  </a>`;
}

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// ── PADRES ──────────────────────────────────────────────────
async function loadPadres() {
  try {
    const [sched, news] = await Promise.all([
      fetchJSON(`${ESPN}/baseball/mlb/teams/25/schedule?season=2026&seasontype=2`),
      fetchJSON(`${ESPN}/baseball/mlb/teams/25/news?limit=5`)
    ]);

    const events = sched.events || [];
    const recent = events.filter(e => isCompleted(e)).slice(-3).reverse();
    const upcoming = events.filter(e => isUpcoming(e)).slice(0, 3);
    const live = events.find(e => isLiveGame(e));

    // Record from standings
    const teamData = sched.team;
    const wins = teamData?.record?.items?.[0]?.stats?.find(s => s.name === 'wins')?.value || 25;
    const losses = teamData?.record?.items?.[0]?.stats?.find(s => s.name === 'losses')?.value || 18;

    let html = `
      <div class="stat-row">
        <div class="stat-card"><div class="stat-label">Record</div><div class="stat-value">${wins}–${losses}</div><div class="stat-sub">2026 MLB season</div></div>
        <div class="stat-card" id="padres-division-rank"><div class="stat-label">NL West</div><div class="stat-value">2nd</div><div class="stat-sub">Loading...</div></div>
        ${live ? `<div class="stat-card"><div class="stat-label">Live now</div><div class="stat-value highlight">${getScore(live)}</div><div class="stat-sub">${getInning(live)}</div></div>` : ''}
        <div class="stat-card"><div class="stat-label">Next series</div><div class="stat-value" style="font-size:16px;">vs LAD</div><div class="stat-sub">Mon 5/18 · Home</div></div>
      </div>`;

    if (live) {
      html += buildLinescore(live);
    }

    html += `<div class="section-label">Recent & upcoming games</div><div class="games">`;
    upcoming.forEach(e => {
      const comp = e.competitions?.[0];
      const opp = getOpponent(comp, 25);
      const ha = isHome(comp, 25) ? 'vs' : '@';
      html += `<div class="game">${badge('up')}<span class="game-date">${fmtDate(e.date)}</span><span class="game-matchup">${ha} ${opp}</span><span class="game-score" style="color:var(--muted);">${fmtTime(e.date)}</span>${pill('up','Upcoming')}</div>`;
    });
    recent.forEach(e => {
      const comp = e.competitions?.[0];
      const opp = getOpponent(comp, 25);
      const ha = isHome(comp, 25) ? 'vs' : '@';
      const won = didWin(comp, 25);
      const score = `${getHomeScore(comp)} – ${getAwayScore(comp)}`;
      html += `<div class="game">${badge(won ? 'W' : 'L')}<span class="game-date">${fmtDate(e.date)}</span><span class="game-matchup">${ha} ${opp}</span><span class="game-score">${score}</span></div>`;
    });
    html += `</div>`;

    html += `<div class="section-label">Latest news</div><div class="news">`;
    (news.articles || []).slice(0, 5).forEach(a => {
      html += newsItem(a.links?.web?.href || 'https://www.espn.com/mlb/team/_/id/25', '#FFC425', a.headline, `ESPN · ${fmtDate(a.published)}`);
    });
    html += `</div>`;

    document.getElementById('panel-padres').innerHTML = html;
  } catch(e) {
    document.getElementById('panel-padres').innerHTML = fallbackPadres();
  }
}

function fallbackPadres() {
  return `
    <div class="stat-row">
      <div class="stat-card"><div class="stat-label">Record</div><div class="stat-value">25–18</div><div class="stat-sub">.581 win %</div></div>
      <div class="stat-card"><div class="stat-label">NL West</div><div class="stat-value">2nd</div><div class="stat-sub">1 GB of LAD</div></div>
      <div class="stat-card"><div class="stat-label">Live tonight</div><div class="stat-value highlight">SD 1–0</div><div class="stat-sub">Bot 5th @ Seattle</div></div>
      <div class="stat-card"><div class="stat-label">Next home</div><div class="stat-value" style="font-size:16px;">Mon 5/18</div><div class="stat-sub">vs LAD · 6:40 PM</div></div>
    </div>
    <div class="section-label">Latest news</div>
    <div class="news">
      ${newsItem('https://www.mlb.com/padres/news','#FFC425',"Canning bombed for 6 runs in 1.2 IP in 7–1 loss to Brewers","MLB.com · today")}
      ${newsItem('https://www.mlb.com/padres/news','#FFC425',"Gavin Sheets walk-off homer saves win Wednesday — Tatis Jr. slump continues","MLB.com · today")}
      ${newsItem('https://www.foxsports.com/mlb/san-diego-padres-team','#FFC425',"Robby Snelling placed on 15-day IL with UCL sprain","Fox Sports · today")}
      ${newsItem('https://www.foxsports.com/mlb/san-diego-padres-team','#FFC425',"Fernando Tatis Jr. still without a home run — problem needs to be resolved","Fox Sports · today")}
      ${newsItem('https://www.mlb.com/padres/news','#FFC425',"Top prospect Salas hitting better than ever — HR from leadoff 3 straight games","MLB.com · May 2")}
    </div>`;
}

// ── CLIPPERS ─────────────────────────────────────────────────
async function loadClippers() {
  try {
    const news = await fetchJSON(`${ESPN}/basketball/nba/teams/12/news?limit=5`);
    let html = `
      <div class="stat-row">
        <div class="stat-card"><div class="stat-label">Season record</div><div class="stat-value">42–40</div><div class="stat-sub">2025–26 complete</div></div>
        <div class="stat-card"><div class="stat-label">West seed</div><div class="stat-value">9th</div><div class="stat-sub">Play-in exit</div></div>
        <div class="stat-card"><div class="stat-label">Draft pick</div><div class="stat-value highlight">No. 5</div><div class="stat-sub">Stolen from Pacers</div></div>
        <div class="stat-card"><div class="stat-label">Next season</div><div class="stat-value" style="font-size:16px;">Oct '26</div><div class="stat-sub">Off-season</div></div>
      </div>
      <div class="playoffs-box">
        <div class="playoffs-label">2026 NBA Playoffs · West — in progress</div>
        <div class="playoffs-line"><strong>SAS leads MIN 3–2</strong> · West Semis (live)</div>
        <div class="playoffs-line">OKC def. LAL 4–0 · West Finals: OKC vs SAS/MIN</div>
      </div>`;
    const clippersStandings = await fetchStandings('basketball', 'nba', 12);
    html += renderStandings(clippersStandings, 12, 'NBA Pacific Division Standings');
    html += `
      <div class="section-label">Latest news</div><div class="news">`;
    (news.articles || []).slice(0, 5).forEach(a => {
      html += newsItem(a.links?.web?.href || 'https://www.espn.com/nba/team/_/name/lac', '#C8102E', a.headline, `ESPN · ${fmtDate(a.published)}`);
    });
    if (!(news.articles?.length)) {
      html += newsItem('https://ktla.com/sports/clippers/clippers-get-fifth-overall-pick-in-2026-nba-draft-by-virtue-of-trade-with-pacers/','#C8102E','Clippers land No. 5 pick via Pacers trade — highest selection since Blake Griffin','KTLA · May 10');
      html += newsItem('https://www.si.com/nba/clippers','#C8102E',"Kawhi Leonard's future is the biggest question of the offseason — trade or run it back?",'SI · today');
      html += newsItem('https://bleacherreport.com/los-angeles-clippers','#C8102E','A true rebuild is looking more realistic than ever for the Clippers this offseason','Bleacher Report · today');
      html += newsItem('https://www.foxsports.com/nba/los-angeles-clippers-team','#C8102E','Clippers mock draft: Finding Darius Garland a backcourt partner with No. 5 pick','Fox Sports · today');
      html += newsItem('https://bleacherreport.com/los-angeles-clippers','#C8102E','Mathurin free agency could be complicated — Clippers may not find it easy to re-sign him','Bleacher Report · today');
    }
    html += `</div>`;
    document.getElementById('panel-clippers').innerHTML = html;
  } catch(e) {
    document.getElementById('panel-clippers').innerHTML = `<div class="error">Could not load Clippers data — showing cached info</div>` + fallbackClippers();
  }
}

function fallbackClippers() {
  return `<div class="stat-row">
    <div class="stat-card"><div class="stat-label">Season record</div><div class="stat-value">42–40</div><div class="stat-sub">2025–26 complete</div></div>
    <div class="stat-card"><div class="stat-label">West seed</div><div class="stat-value">9th</div><div class="stat-sub">Play-in exit</div></div>
    <div class="stat-card"><div class="stat-label">Draft pick</div><div class="stat-value highlight">No. 5</div><div class="stat-sub">Stolen from Pacers</div></div>
  </div>
  <div class="section-label">Latest news</div><div class="news">
    ${newsItem('https://ktla.com/sports/clippers/clippers-get-fifth-overall-pick-in-2026-nba-draft-by-virtue-of-trade-with-pacers/','#C8102E','Clippers land No. 5 pick via Pacers trade — highest selection since Blake Griffin','KTLA · May 10')}

// ── STANDINGS ─────────────────────────────────────────────────
async function fetchStandings(sport, league, teamId) {
  try {
    // Use the correct ESPN standings endpoint with groups
    const url = `https://site.web.api.espn.com/apis/v2/sports/${sport}/${league}/standings?level=3&sort=winpercent:desc,wins:desc,gamesplayed:asc`;
    const data = await fetchJSON(url);
    
    let divisionEntries = null;
    
    function findDivision(node) {
      if (node.standings?.entries) {
        const hasTeam = node.standings.entries.some(e => 
          String(e.team?.id) === String(teamId)
        );
        if (hasTeam) { divisionEntries = node.standings.entries; return true; }
      }
      if (node.children) {
        for (const child of node.children) { if (findDivision(child)) return true; }
      }
      return false;
    }
    
    if (data.children) { for (const c of data.children) findDivision(c); }
    else if (data.standings?.entries) divisionEntries = data.standings.entries;
    
    return divisionEntries;
  } catch(e) { return null; }
}

function renderStandings(entries, myTeamId, label) {
  if (!entries || !entries.length) return '';
  
  function getStat(entry, names) {
    for (const n of names) {
      const s = entry.stats?.find(x => x.name === n || x.shortDisplayName === n);
      if (s) return s.displayValue ?? s.value ?? '-';
    }
    return '-';
  }
  
  let html = `<div class="section-label">${label}</div>
  <table class="standings-table">
    <thead><tr>
      <th>Team</th><th>W</th><th>L</th><th>PCT</th><th>GB</th>
    </tr></thead><tbody>`;
  
  entries.forEach((entry, i) => {
    const isMyTeam = String(entry.team?.id) === String(myTeamId);
    const name = entry.team?.shortDisplayName || entry.team?.displayName || '?';
    const w = getStat(entry, ['wins','W','w']);
    const l = getStat(entry, ['losses','L','l']);
    const pct = getStat(entry, ['winPercent','PCT','pct','winPct']);
    const gb = getStat(entry, ['gamesBehind','GB','gb']);
    html += `<tr class="${isMyTeam ? 'my-team' : ''}">
      <td><span class="standings-rank">${i+1}</span>${name}</td>
      <td>${w}</td><td>${l}</td><td>${typeof pct === 'number' ? pct.toFixed(3) : pct}</td><td>${gb}</td>
    </tr>`;
  });
  
  html += '</tbody></table>';
  return html;
}

// ── HELPERS ──────────────────────────────────────────────────
function getOpponent(comp, teamId) {
  if (!comp) return 'TBD';
  const opp = comp.competitors?.find(c => Number(c.id) !== teamId);
  return opp?.team?.shortDisplayName || opp?.team?.displayName || opp?.team?.abbreviation || opp?.team?.abbr || 'TBD';
}
function isHome(comp, teamId) {
  const t = comp?.competitors?.find(c => Number(c.id) === teamId);
  return t?.homeAway === 'home';
}
function isCompleted(event) {
  const comp = event.competitions?.[0];
  return comp?.status?.type?.completed === true || event.status?.type?.state === 'post';
}
function isLiveGame(event) {
  return event.status?.type?.state === 'in';
}
function isUpcoming(event) {
  return !isCompleted(event) && !isLiveGame(event);
}
function didWin(comp, teamId) {
  const t = comp?.competitors?.find(c => Number(c.id) === teamId);
  return t?.winner === true || t?.winner === 'true';
}
function parseScore(s) {
  if (s === null || s === undefined) return "0";
  if (typeof s === "object") return String(s.displayValue ?? s.value ?? 0);
  return String(s);
}
function getHomeScore(comp) {
  const h = comp?.competitors?.find(c => c.homeAway === "home");
  return parseScore(h?.score);
}
function getAwayScore(comp) {
  const a = comp?.competitors?.find(c => c.homeAway === "away");
  return parseScore(a?.score);
}
function getScore(event) {
  const comp = event.competitions?.[0];
  if (!comp) return "-";
  const home = comp.competitors?.find(c => c.homeAway === "home");
  const away = comp.competitors?.find(c => c.homeAway === "away");
  return `${away?.team?.abbreviation} ${parseScore(away?.score)} - ${parseScore(home?.score)} ${home?.team?.abbreviation}`;
}
function getInning(event) {
  const status = event.status;
  if (!status) return '';
  return status.type?.shortDetail || status.displayClock || '';
}
function buildLinescore(event) {
  const comp = event.competitions?.[0];
  if (!comp) return '';
  const home = comp.competitors?.find(c => c.homeAway === 'home');
  const away = comp.competitors?.find(c => c.homeAway === 'away');
  const innings = Math.max(home?.linescores?.length || 0, away?.linescores?.length || 0);
  if (innings === 0) return '';
  let ths = '<th style="text-align:left;">Team</th>';
  for (let i = 1; i <= innings; i++) ths += `<th>${i}</th>`;
  ths += '<th style="border-left:1px solid var(--border2);">R</th><th>H</th><th>E</th>';

  function teamRow(t) {
    let cells = `<td class="tname">${t?.team?.abbreviation || ''}</td>`;
    for (let i = 0; i < innings; i++) cells += `<td>${t?.linescores?.[i]?.displayValue ?? '—'}</td>`;
    const hits = t?.statistics?.find(s => s.name === 'hits')?.displayValue || '0';
    const errs = t?.statistics?.find(s => s.name === 'errors')?.displayValue || '0';
    cells += `<td class="total" style="border-left:1px solid var(--border2);">${t?.score || 0}</td><td>${hits}</td><td>${errs}</td>`;
    return `<tr>${cells}</tr>`;
  }

  return `<div class="section-label">Live linescore</div>
  <div class="linescore-wrap"><table class="linescore">
    <thead><tr>${ths}</tr></thead>
    <tbody>${teamRow(away)}${teamRow(home)}</tbody>
  </table></div>`;
}

      <div class="section-label">2025 season — last 5 games</div><div class="games">
        <div class="game">${badge('L')}<span class="game-date">Jan 4</span><span class="game-matchup">@ Pittsburgh (SNF)</span><span class="game-score">PIT 26, BAL 24</span></div>
        <div class="game">${badge('W')}<span class="game-date">Dec 27</span><span class="game-matchup">@ Green Bay</span><span class="game-score">BAL 41, GB 24</span></div>
        <div class="game">${badge('L')}<span class="game-date">Dec 21</span><span class="game-matchup">vs New England (SNF)</span><span class="game-score">NE 28, BAL 24</span></div>
        <div class="game">${badge('W')}<span class="game-date">Dec 14</span><span class="game-matchup">@ Cincinnati</span><span class="game-score">BAL 24, CIN 0</span></div>
        <div class="game">${badge('L')}<span class="game-date">Dec 7</span><span class="game-matchup">vs Pittsburgh</span><span class="game-score">PIT 27, BAL 22</span></div>
      </div>
      <div class="section-label">Latest news</div><div class="news">`;
    (news.articles || []).slice(0, 5).forEach(a => {
      html += newsItem(a.links?.web?.href || 'https://www.baltimoreravens.com/news', '#9E2A2B', a.headline, `ESPN · ${fmtDate(a.published)}`);
    });
    if (!(news.articles?.length)) {
      html += newsItem('https://www.baltimoreravens.com/news/ravens-record-prediction-schedule-takeaways-joe-burrow-primetime-mike-florio-mike-tomlin-lamar-jackson','#9E2A2B','Pundits predict Ravens 2026 record — Lamar Jackson, 4 primetime games highlight slate','Ravens.com · today');
      html += newsItem('https://www.espn.com/nfl/story/_/page/nflschedulerelease-48737363/baltimore-ravens-nfl-schedule-2026-takeaways-predictions','#9E2A2B','Ravens 2026 schedule takeaways and predictions — ESPN breakdown','ESPN · yesterday');
      html += newsItem('https://www.baltimoresun.com/2026/05/15/ravens-schedule-sets-up-well-mike-preston-commentary/','#9E2A2B',"Schedule sets up well for late-season surge — closes with 4 straight AFC North games",'Baltimore Sun · today');
      html += newsItem('https://www.si.com/nfl/ravens/onsi/most-important-baltimore-ravens-revenge-games-on-the-2026-schedule-01krmtna0tq4','#9E2A2B','Most important revenge games on the 2026 schedule — SI breaks it down','SI · today');
      html += newsItem('https://www.msn.com/en-us/sports/nfl/baltimore-ravens-2026-schedule-features-4-primetime-games/vi-AA23ejNP','#9E2A2B','Ravens 2026 schedule features 4 primetime games including Bengals prime matchup','MSN · today');
    }
    html += `</div>`;
    document.getElementById('panel-ravens').innerHTML = html;
  } catch(e) {
    document.getElementById('panel-ravens').innerHTML = `
      <div class="stat-row">
        <div class="stat-card"><div class="stat-label">2025 record</div><div class="stat-value">10–7</div><div class="stat-sub">AFC North</div></div>
        <div class="stat-card"><div class="stat-label">Primetime 2026</div><div class="stat-value">4</div><div class="stat-sub">Games scheduled</div></div>
      </div>
      <div class="section-label">Latest news</div><div class="news">
        ${newsItem('https://www.baltimoreravens.com/news','#9E2A2B','Pundits predict Ravens 2026 record after schedule release','Ravens.com · today')}
        ${newsItem('https://www.baltimoresun.com/2026/05/15/ravens-schedule-sets-up-well-mike-preston-commentary/','#9E2A2B','Schedule sets up well for late-season surge — Baltimore Sun','Baltimore Sun · today')}
        ${newsItem('https://www.espn.com/nfl/team/_/name/bal','#9E2A2B','Full Ravens schedule and news at ESPN','ESPN')}
      </div>`;
  }
}

// ── AUTO-REFRESH ─────────────────────────────────────────────
let autoRefreshTimer = null;

async function checkForLiveGames() {
  try {
    const [mlb, nba] = await Promise.all([
      fetchJSON(`${ESPN}/baseball/mlb/scoreboard`),
      fetchJSON(`${ESPN}/basketball/nba/scoreboard`)
    ]);
    const allEvents = [...(mlb.events || []), ...(nba.events || [])];
    const myTeamIds = ["25","1","12","24","33"];
    return allEvents.some(e =>
      e.status?.type?.state === "in" &&
      e.competitions?.[0]?.competitors?.some(c => myTeamIds.includes(c.id))
    );
  } catch { return false; }
}

async function scheduleAutoRefresh() {
  if (autoRefreshTimer) clearTimeout(autoRefreshTimer);
  const isLive = await checkForLiveGames();
  const label = document.getElementById("last-updated");
  if (isLive) {
    label.textContent = label.textContent.replace(" · LIVE ●", "") + " · LIVE ●";
    autoRefreshTimer = setTimeout(async () => {
      await refreshAll();
      scheduleAutoRefresh();
    }, 60000); // refresh every 60 seconds during live games
  } else {
    label.textContent = label.textContent.replace(" · LIVE ●", "");
    autoRefreshTimer = setTimeout(scheduleAutoRefresh, 300000); // check every 5 min otherwise
  }
}

// ── INIT ─────────────────────────────────────────────────────
refreshAll().then(scheduleAutoRefresh);
</script>
